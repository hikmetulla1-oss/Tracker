<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a472a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>30 Kunlik Panel</title>
<style>
  :root {
    --green-dark: #1a472a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --gold: #f4a261;
    --gold-light: #ffecd2;
    --blue: #1565c0;
    --blue-light: #e3f2fd;
    --bg: #0f1f15;
    --surface: #1c2e20;
    --surface2: #243228;
    --text: #e8f5e9;
    --text-dim: #81c784;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--green-dark), #0d3320);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .month-badge {
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* DAY SELECTOR */
  .day-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-btn {
    min-width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .day-btn.active {
    background: var(--green-light);
    color: var(--green-dark);
    transform: scale(1.1);
  }
  .day-btn.has-data {
    border: 2px solid var(--green-light);
    color: var(--text);
  }

  /* CONTENT */
  .content { padding: 16px; }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin: 20px 0 10px;
  }

  /* PROTOCOL CARD */
  .proto-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    border-left: 4px solid var(--green-light);
    transition: box-shadow 0.2s;
  }
  .proto-card:active { box-shadow: 0 0 0 2px var(--green-light); }

  .proto-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .proto-name {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .proto-emoji { font-size: 18px; }

  .proto-target {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* TIME INPUT */
  .time-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .time-input-wrap {
    flex: 1;
    position: relative;
  }
  .time-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
  }
  .time-input:focus { border-color: var(--green-light); }
  .time-input::placeholder { color: #4a6b51; font-weight: 400; letter-spacing: 1px; }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-top: 8px;
  }
  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 20px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--green-light), #95d5b2);
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .progress-pct {
    font-weight: 700;
    color: var(--green-light);
  }

  /* SLEEP TRACKER */
  .sleep-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    border-left: 4px solid var(--blue);
  }
  .sleep-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 10px;
  }
  .sleep-btn {
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 600;
    padding: 8px 2px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .sleep-btn.selected {
    background: var(--blue);
    border-color: #42a5f5;
    color: #fff;
  }

  /* MOOD */
  .mood-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    border-left: 4px solid var(--gold);
  }
  .mood-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .mood-btn {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 20px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .mood-btn.selected {
    background: var(--gold-light);
    border-color: var(--gold);
    transform: scale(1.1);
  }

  /* DAILY SUMMARY */
  .summary-card {
    background: linear-gradient(135deg, var(--green-dark), #0d3320);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    border: 1px solid var(--green-light);
  }
  .summary-pct {
    font-size: 48px;
    font-weight: 800;
    color: var(--green-light);
    line-height: 1;
  }
  .summary-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    display: flex;
    border-top: 1px solid var(--surface2);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 12px 4px 8px;
    cursor: pointer;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--green-light); }
  .nav-icon { font-size: 20px; }

  /* STATS PAGE */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--green-light);
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .bar-chart { margin-top: 10px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .bar-name { font-size: 11px; color: var(--text-dim); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-bg { flex: 1; background: var(--surface2); border-radius: 20px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--green-light), #95d5b2); transition: width 0.5s ease; }
  .bar-val { font-size: 11px; font-weight: 700; color: var(--green-light); width: 36px; text-align: right; }

  .page { display: none; }
  .page.active { display: block; }

  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gold-light);
    color: #7c4d00;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🌿 30 Kunlik Panel</h1>
    <span class="month-badge" id="monthBadge">2025</span>
  </div>
  <div class="day-scroll" id="dayScroll"></div>
</div>

<!-- TODAY PAGE -->
<div class="page active" id="page-today">
  <div class="content">

    <div class="summary-card" style="margin-bottom:4px">
      <div class="summary-pct" id="dailyPct">0%</div>
      <div class="summary-label" id="dayLabel">Bugungi natija</div>
    </div>

    <div class="section-title">Protokollar</div>
    <div id="protoList"></div>

    <div class="section-title">Uyqu</div>
    <div class="sleep-card">
      <div class="proto-name"><span class="proto-emoji">🌙</span> Necha soat uxladingiz?</div>
      <div class="sleep-grid" id="sleepGrid"></div>
    </div>

    <div class="section-title">Kayfiyat</div>
    <div class="mood-card">
      <div class="proto-name"><span class="proto-emoji">😊</span> Bugungi kayfiyat</div>
      <div class="mood-row" id="moodRow"></div>
    </div>

  </div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div class="content">
    <div class="section-title" style="margin-top:8px">Umumiy statistika</div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="section-title">Har bir vazifa bo'yicha o'rtacha</div>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('today',this)">
    <span class="nav-icon">📋</span>Bugun
  </button>
  <button class="nav-btn" onclick="showPage('stats',this)">
    <span class="nav-icon">📊</span>Statistika
  </button>
</div>

<script>
const PROTOCOLS = [
  { id:'pray',    emoji:'🕌', name:'Pray (Namoz)',    target:'2:10' },
  { id:'zikr',    emoji:'📿', name:"Zikr / Istig'for", target:'0:20' },
  { id:'quron',   emoji:'📖', name:"Qur'on o'qish",   target:'0:20' },
  { id:'ielts',   emoji:'🎓', name:'IELTS',            target:'6:00' },
  { id:'reading', emoji:'📚', name:'Reading Book',     target:'3:00' },
  { id:'online',  emoji:'💻', name:'Online Teaching',  target:'2:00' },
  { id:'sport',   emoji:'🏋️', name:'Sport / Gym',     target:'1:00' },
];

const MOODS = ['😫','😕','😐','😊','🤩'];
const SLEEP_OPTS = ['9+','8','7','6','5','4','3-'];

let selectedDay = new Date().getDate();
let data = JSON.parse(localStorage.getItem('tracker30') || '{}');

function save() { localStorage.setItem('tracker30', JSON.stringify(data)); }

function dayKey(d) { return `day_${d}`; }
function getDayData(d) { return data[dayKey(d)] || {}; }
function setDayData(d, obj) { data[dayKey(d)] = obj; save(); }

function parseMinutes(str) {
  if (!str || !str.includes(':')) return 0;
  const [h, m] = str.split(':').map(Number);
  return (isNaN(h)?0:h)*60 + (isNaN(m)?0:m);
}
function targetMinutes(t) { return parseMinutes(t); }
function pct(done, tgt) { return tgt ? Math.min(100, Math.round(done/tgt*100)) : 0; }

// ── BUILD UI ────────────────────────────────────────────────────────────────

function buildDayScroll() {
  const el = document.getElementById('dayScroll');
  el.innerHTML = '';
  for (let d = 1; d <= 31; d++) {
    const dd = getDayData(d);
    const hasData = Object.keys(dd).length > 0;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === selectedDay ? ' active' : '') + (hasData ? ' has-data' : '');
    btn.textContent = d < 10 ? '0'+d : d;
    btn.onclick = () => { selectedDay = d; refresh(); };
    el.appendChild(btn);
  }
  // scroll selected into view
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ inline:'center', behavior:'smooth' });
}

function buildProtos() {
  const dd = getDayData(selectedDay);
  const list = document.getElementById('protoList');
  list.innerHTML = '';

  PROTOCOLS.forEach(p => {
    const val = dd[p.id] || '';
    const tgtMin = targetMinutes(p.target);
    const doneMin = parseMinutes(val);
    const p100 = pct(doneMin, tgtMin);

    const card = document.createElement('div');
    card.className = 'proto-card';
    card.innerHTML = `
      <div class="proto-header">
        <div class="proto-name"><span class="proto-emoji">${p.emoji}</span>${p.name}</div>
        <span class="proto-target">Maqsad: ${p.target}</span>
      </div>
      <div class="time-row">
        <div class="time-input-wrap">
          <input class="time-input" type="text" placeholder="0:00" maxlength="5"
            value="${val}" data-id="${p.id}"
            inputmode="numeric"
          />
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${p100}%"></div>
        </div>
        <div class="progress-label">
          <span>${doneMin} daqiqa / ${tgtMin} daqiqa</span>
          <span class="progress-pct">${p100}%</span>
        </div>
      </div>
    `;
    list.appendChild(card);

    const inp = card.querySelector('input');
    inp.addEventListener('input', function() {
      let v = this.value.replace(/[^0-9:]/g,'');
      // auto insert colon
      if (v.length === 2 && !v.includes(':') && this.value.length > this.dataset.prev?.length) {
        v = v + ':';
      }
      this.dataset.prev = v.length;
      this.value = v;
    });
    inp.addEventListener('change', function() {
      const dd2 = getDayData(selectedDay);
      dd2[p.id] = this.value;
      setDayData(selectedDay, dd2);
      refresh();
    });
    inp.dataset.prev = val.length;
  });
}

function buildSleep() {
  const dd = getDayData(selectedDay);
  const grid = document.getElementById('sleepGrid');
  grid.innerHTML = '';
  SLEEP_OPTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sleep-btn' + (dd.sleep === s ? ' selected' : '');
    btn.textContent = s + (s==='9+'||s==='3-'?'':' soat');
    btn.onclick = () => {
      const dd2 = getDayData(selectedDay);
      dd2.sleep = (dd2.sleep === s) ? null : s;
      setDayData(selectedDay, dd2);
      buildSleep();
    };
    grid.appendChild(btn);
  });
}

function buildMood() {
  const dd = getDayData(selectedDay);
  const row = document.getElementById('moodRow');
  row.innerHTML = '';
  MOODS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn' + (dd.mood === i ? ' selected' : '');
    btn.textContent = m;
    btn.onclick = () => {
      const dd2 = getDayData(selectedDay);
      dd2.mood = (dd2.mood === i) ? null : i;
      setDayData(selectedDay, dd2);
      buildMood();
    };
    row.appendChild(btn);
  });
}

function updateSummary() {
  const dd = getDayData(selectedDay);
  let total = 0;
  PROTOCOLS.forEach(p => {
    const doneMin = parseMinutes(dd[p.id] || '');
    const tgtMin = targetMinutes(p.target);
    total += pct(doneMin, tgtMin);
  });
  const avg = Math.round(total / PROTOCOLS.length);
  document.getElementById('dailyPct').textContent = avg + '%';
  document.getElementById('dayLabel').textContent = `${selectedDay}-kun natijasi`;
}

function buildStats() {
  // Count days with data
  let daysLogged = 0, totalPct = 0;
  let bestDay = 0, bestPct = 0;
  let streakCurrent = 0, streakMax = 0, lastStreak = 0;

  for (let d = 1; d <= 31; d++) {
    const dd = getDayData(d);
    if (Object.keys(dd).length === 0) { lastStreak = 0; continue; }
    daysLogged++;
    let dayTotal = 0;
    PROTOCOLS.forEach(p => {
      const doneMin = parseMinutes(dd[p.id] || '');
      dayTotal += pct(doneMin, targetMinutes(p.target));
    });
    const dayAvg = Math.round(dayTotal / PROTOCOLS.length);
    totalPct += dayAvg;
    if (dayAvg > bestPct) { bestPct = dayAvg; bestDay = d; }
    lastStreak++;
    if (lastStreak > streakMax) streakMax = lastStreak;
  }
  streakCurrent = lastStreak;
  const overallAvg = daysLogged ? Math.round(totalPct / daysLogged) : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${daysLogged}</div><div class="stat-lbl">Kunlar to'ldirildi</div></div>
    <div class="stat-card"><div class="stat-num">${overallAvg}%</div><div class="stat-lbl">O'rtacha natija</div></div>
    <div class="stat-card"><div class="stat-num">${streakCurrent}🔥</div><div class="stat-lbl">Joriy seriya</div></div>
    <div class="stat-card"><div class="stat-num">${bestPct}%</div><div class="stat-lbl">${bestDay ? bestDay+'-kun (eng yaxshi)' : 'Hali yo\'q'}</div></div>
  `;

  // Per-protocol bar chart
  const chart = document.getElementById('barChart');
  chart.innerHTML = '';
  PROTOCOLS.forEach(p => {
    let pSum = 0, pDays = 0;
    for (let d = 1; d <= 31; d++) {
      const dd = getDayData(d);
      if (!dd[p.id]) continue;
      pDays++;
      pSum += pct(parseMinutes(dd[p.id]), targetMinutes(p.target));
    }
    const avg = pDays ? Math.round(pSum / pDays) : 0;
    chart.innerHTML += `
      <div class="bar-row">
        <div class="bar-name">${p.emoji} ${p.name}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${avg}%"></div></div>
        <div class="bar-val">${avg}%</div>
      </div>
    `;
  });
}

function refresh() {
  buildDayScroll();
  buildProtos();
  buildSleep();
  buildMood();
  updateSummary();
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') buildStats();
}

// Init
document.getElementById('monthBadge').textContent = new Date().getFullYear();
refresh();
</script>
</body>
</html>
